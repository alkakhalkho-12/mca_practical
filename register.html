<html>
    <head>
         <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
         <script src="js/script.js"></script>
    </head>
    <style>
        .form-group-row div {
            margin-top:20px;
        } 
        #bank_details {
            text-decoration:underline;
            width:200px;
        }
        .bank_group div {
            margin-top:20px;
        }
    </style>
    <body> 
      <div class="container">
        <div class="row">
            <div class="col-md-12">
                <form> 
                    <div class="form-group-row">
                        <div class="col-sm-4 col-md-6 col-lg-4"> 
                            <input type="text" class="form-control" placeholder="Enter Full Name" 
                            name="full_name"/>  
                        </div>
                        <div class="col-sm-4 col-md-6 col-lg-4"> 
                            <input type="text" class="form-control" placeholder="Enter Father Name" 
                            name="father_name"/>  
                        </div>
                        <div class="col-sm-4 col-md-6 col-lg-4"> 
                            <input type="text" class="form-control" placeholder="Enter Aadhaar Number" 
                            name="aadhaar_number"/>  
                        </div>
                        <div class="col-sm-4 col-md-6 col-lg-4"> 
                            <input type="email" class="form-control" placeholder="Enter Email" 
                            name="email"/>  
                        </div>
                        <div class="col-sm-4 col-md-6 col-lg-4"> 
                            <input type="password" class="form-control" placeholder="Enter Password" 
                            name="password"/>  
                        </div>
                        <div class="col-sm-4 col-md-6 col-lg-4"> 
                            <select class="form-control">
                                <option value="">Please select options</option>
                                <option value="10th">10th</option>
                                <option value="12th">12th</option>
                                <option value="Graduate">Graduate</option>
                                <option value="Master">Master</option>
                            </select>
                        </div>
                        <div class="col-sm-4 col-md-6 col-lg-4"> 
                            <select class="form-control">
                                <option value="">Please select gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option> 
                            </select>
                        </div>
                         <div class="col-sm-4 col-md-6 col-lg-4"> 
                            <input type="date" class="form-control" placeholder="Enter date of birth" 
                            name="date_of_birth"/>  
                        </div>
                    </div>
                    <div style="position:relative;top:30px;left:20px;color:black;font-weight:600;">
                            <p id="bank_details">Bank Details Information</p>
                    </div>
                    <div class="form-group-row">                        
                        <div class="col-sm-4 col-md-6 col-lg-4" class="bank_group"> 
                            <input type="text" class="form-control" placeholder="Bank Name" 
                            name="bank_name"/>  
                        </div>
                        <div class="col-sm-4 col-md-6 col-lg-4" class="bank_group"> 
                            <input type="text" class="form-control" placeholder="Enter account holder name" 
                            name="account_holder_name"/>  
                        </div>
                        <div class="col-sm-4 col-md-6 col-lg-4" class="bank_group"> 
                            <input type="number" class="form-control" placeholder="Enter account number" 
                            name="account_number"/>  
                        </div>
                    </div>
                </form>
            </div>
        </div>
      </div>
    </body>
</html>
